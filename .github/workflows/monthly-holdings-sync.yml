name: Monthly Fund Holdings Sync

on:
  schedule:
    - cron: '0 10 10 * *'
  workflow_dispatch:
    inputs:
      target_period:
        description: 'Optional target period in YYYY-MM format'
        required: false
        type: string
      fund_code:
        description: 'Optional single fund code for a focused retry'
        required: false
        type: string
      batch_size:
        description: 'How many funds to process per chunk'
        required: false
        default: '50'
        type: string
      cooldown_seconds:
        description: 'Pause between chunks to reduce rate limits'
        required: false
        default: '45'
        type: string

jobs:
  sync-kap-holdings:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install parser dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-kap-holdings.txt

      - name: Run monthly holdings sync
        env:
          PYTHONUNBUFFERED: "1"
          KAP_HOLDINGS_MAX_WORKERS: "4"
          KAP_HOLDINGS_LOOKBACK_DAYS: "120"
          KAP_HOLDINGS_BATCH_SIZE: ${{ inputs.batch_size || '50' }}
          KAP_HOLDINGS_BATCH_COOLDOWN_SECONDS: ${{ inputs.cooldown_seconds || '45' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.target_period }}" ]; then
            ARGS="$ARGS --target-period ${{ inputs.target_period }}"
          fi
          if [ -n "${{ inputs.fund_code }}" ]; then
            ARGS="$ARGS --fund-code ${{ inputs.fund_code }}"
          fi
          python scripts/sync_kap_holdings.py $ARGS
