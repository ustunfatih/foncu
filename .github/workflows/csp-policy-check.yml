name: CSP Policy Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  csp-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run CSP guard
        run: node scripts/check-csp.js
